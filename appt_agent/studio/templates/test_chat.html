<!DOCTYPE html>
<html lang="es" class="h-full bg-gray-950">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat de prueba — appt-agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .input { @apply w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-indigo-500 placeholder-gray-500; }
    .btn { @apply font-medium px-5 py-2.5 rounded-xl text-sm transition-colors disabled:opacity-50; }
    .btn-primary { @apply btn bg-indigo-600 hover:bg-indigo-500 text-white; }
    .btn-secondary { @apply btn bg-gray-800 hover:bg-gray-700 text-gray-200; }
  </style>
</head>
<body class="h-full flex items-center justify-center p-4" x-data="testChat()" x-init="init()">

  <!-- ── Step 1: pick network + ID ─────────────────────────── -->
  <div x-show="!started" class="w-full max-w-sm bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="px-6 py-5 bg-indigo-600/10 border-b border-indigo-900/40 text-center relative">
      <!-- Logo + brand -->
      <div class="flex items-center justify-center gap-2 mb-1">
        <span class="text-3xl">🗓️</span>
        <div class="text-left">
          <p class="text-sm font-bold text-white leading-none">appt-agent</p>
          <p class="text-xs text-indigo-400 leading-none">Chat de prueba</p>
        </div>
      </div>
      <p class="text-xs text-gray-400 mt-2">Simula cómo se ve el agente desde WhatsApp o Instagram</p>

      <!-- Agent status badge -->
      <div class="mt-3 flex justify-center">
        <template x-if="agentReady === null">
          <span class="inline-flex items-center gap-1.5 text-xs bg-gray-800 text-gray-400 px-3 py-1 rounded-full">
            <span class="w-1.5 h-1.5 rounded-full bg-gray-500 animate-pulse"></span>
            Verificando agente…
          </span>
        </template>
        <template x-if="agentReady === true">
          <span class="inline-flex items-center gap-1.5 text-xs bg-green-900/50 text-green-400 px-3 py-1 rounded-full border border-green-800/50">
            <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>
            Agente activo
          </span>
        </template>
        <template x-if="agentReady === false">
          <a href="/studio/llm" target="_blank"
             class="inline-flex items-center gap-1.5 text-xs bg-yellow-900/40 text-yellow-400 px-3 py-1 rounded-full border border-yellow-800/50 hover:bg-yellow-900/60 transition-colors">
            <span class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse"></span>
            Sin configurar → Configura el LLM ↗
          </a>
        </template>
      </div>
    </div>

    <div class="p-6 space-y-4">
      <!-- Network selector -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-2">Red social</label>
        <div class="grid grid-cols-2 gap-2">
          <button @click="network='whatsapp'"
                  :class="network==='whatsapp'
                    ? 'border-green-500 bg-green-900/20 text-green-300'
                    : 'border-gray-700 bg-gray-800 text-gray-400 hover:border-gray-600'"
                  class="flex flex-col items-center gap-1.5 py-3 rounded-xl border transition-colors text-xs font-medium">
            <span class="text-2xl">📱</span>
            WhatsApp
          </button>
          <button @click="network='instagram'"
                  :class="network==='instagram'
                    ? 'border-pink-500 bg-pink-900/20 text-pink-300'
                    : 'border-gray-700 bg-gray-800 text-gray-400 hover:border-gray-600'"
                  class="flex flex-col items-center gap-1.5 py-3 rounded-xl border transition-colors text-xs font-medium">
            <span class="text-2xl">📸</span>
            Instagram
          </button>
          <button @click="network='telegram'"
                  :class="network==='telegram'
                    ? 'border-sky-500 bg-sky-900/20 text-sky-300'
                    : 'border-gray-700 bg-gray-800 text-gray-400 hover:border-gray-600'"
                  class="flex flex-col items-center gap-1.5 py-3 rounded-xl border transition-colors text-xs font-medium">
            <span class="text-2xl">✈️</span>
            Telegram
          </button>
          <button @click="network='web'"
                  :class="network==='web'
                    ? 'border-indigo-500 bg-indigo-900/20 text-indigo-300'
                    : 'border-gray-700 bg-gray-800 text-gray-400 hover:border-gray-600'"
                  class="flex flex-col items-center gap-1.5 py-3 rounded-xl border transition-colors text-xs font-medium">
            <span class="text-2xl">🌐</span>
            Web / API
          </button>
        </div>
      </div>

      <!-- ID / user input -->
      <div>
        <label class="block text-xs font-medium text-gray-400 mb-1.5"
               x-text="network === 'whatsapp' ? 'Número de WhatsApp (con código de país)'
                      : network === 'instagram' ? 'Usuario de Instagram (sin @)'
                      : network === 'telegram'  ? 'Username de Telegram (sin @)'
                      : 'ID de sesión (cualquier texto)'">
        </label>
        <input x-model="userId" @keydown.enter="startChat()"
               type="text"
               :placeholder="network === 'whatsapp'  ? '+57 312 345 6789'
                            : network === 'instagram' ? 'juan_perez'
                            : network === 'telegram'  ? 'juanperez'
                            : 'session-prueba-1'"
               class="input" />
        <p class="text-xs text-gray-600 mt-1.5">
          Este ID se usará como <code class="bg-gray-800 px-1 rounded">session_id</code>
          para toda la conversación.
        </p>
      </div>

      <button @click="startChat()" :disabled="!userId.trim() || !network"
              class="btn-primary w-full">
        Iniciar chat →
      </button>

      <!-- Link to full studio -->
      <p class="text-center text-xs text-gray-700">
        ¿Quieres configurar el agente?
        <a href="/" class="text-indigo-500 hover:text-indigo-400">Panel Studio →</a>
      </p>
    </div>
  </div>

  <!-- ── Step 2: chat interface ─────────────────────────────── -->
  <div x-show="started" x-cloak
       class="w-full max-w-sm h-[90vh] max-h-[680px] bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl flex flex-col overflow-hidden">

    <!-- Chat header -->
    <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between"
         :class="{
           'bg-green-900/20':  network==='whatsapp',
           'bg-pink-900/20':   network==='instagram',
           'bg-sky-900/20':    network==='telegram',
           'bg-indigo-900/20': network==='web',
         }">
      <div class="flex items-center gap-2">
        <span class="text-xl" x-text="network==='whatsapp' ? '📱' : network==='instagram' ? '📸' : network==='telegram' ? '✈️' : '🌐'"></span>
        <div>
          <p class="text-xs font-semibold text-white" x-text="userId"></p>
          <p class="text-xs text-gray-500" x-text="network + ' · sesión activa'"></p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs px-2 py-0.5 rounded-full font-medium"
              :class="{
                'bg-green-900/50 text-green-400':  state==='booked',
                'bg-yellow-900/50 text-yellow-400': state==='confirm',
                'bg-gray-800 text-gray-400':        !state || state==='greeting' || state==='collect_info',
              }"
              x-show="state"
              x-text="stateLabel(state)">
        </span>
        <button @click="reset()" class="text-gray-600 hover:text-gray-300 text-xs">✕ Salir</button>
      </div>
    </div>

    <!-- Messages -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3" x-ref="msgs">

      <!-- Welcome system msg -->
      <div class="text-center">
        <span class="text-xs bg-gray-800 text-gray-500 px-3 py-1 rounded-full">
          Conversación iniciada · <span x-text="network + '/' + userId"></span>
        </span>
      </div>

      <template x-for="m in messages" :key="m.id">
        <div :class="m.role==='user' ? 'flex justify-end' : 'flex justify-start'">
          <div :class="m.role==='user'
            ? 'max-w-[80%] bg-green-600 text-white rounded-2xl rounded-tr-sm px-3 py-2 text-sm'
            : 'max-w-[80%] bg-gray-800 text-gray-100 rounded-2xl rounded-tl-sm px-3 py-2 text-sm'"
            x-html="m.content.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')">
          </div>
        </div>
      </template>

      <!-- Typing indicator -->
      <div x-show="loading" class="flex justify-start">
        <div class="bg-gray-800 rounded-2xl rounded-tl-sm px-4 py-3">
          <div class="flex gap-1">
            <div class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay:0ms"></div>
            <div class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay:150ms"></div>
            <div class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-bounce" style="animation-delay:300ms"></div>
          </div>
        </div>
      </div>

      <!-- Appointment confirmed banner -->
      <div x-show="appointment" x-cloak
           class="bg-green-900/30 border border-green-800/50 rounded-xl p-3 text-xs">
        <p class="font-semibold text-green-400 mb-1">✅ Cita confirmada</p>
        <p class="text-green-300">
          <span x-text="appointment?.attendee_name"></span> ·
          <span x-text="appointment?.start ? new Date(appointment.start).toLocaleString('es') : ''"></span>
        </p>
      </div>
    </div>

    <!-- Input -->
    <div class="px-3 pb-3 pt-2 border-t border-gray-800">
      <!-- Quick replies (first turn only) -->
      <div x-show="messages.length === 0 && !loading" class="flex flex-wrap gap-1.5 mb-2">
        <button @click="send('Quiero una cita')" class="text-xs bg-gray-800 hover:bg-gray-700 px-2.5 py-1 rounded-full text-gray-300">Quiero una cita</button>
        <button @click="send('Necesito reservar un turno')" class="text-xs bg-gray-800 hover:bg-gray-700 px-2.5 py-1 rounded-full text-gray-300">Reservar un turno</button>
        <button @click="send('Hola')" class="text-xs bg-gray-800 hover:bg-gray-700 px-2.5 py-1 rounded-full text-gray-300">Hola</button>
      </div>

      <!-- State: BOOKED = show restart -->
      <div x-show="state === 'booked'" x-cloak class="text-center pb-1">
        <button @click="newSession()" class="text-xs text-indigo-400 hover:text-indigo-300 underline">
          + Nueva conversación con el mismo usuario
        </button>
      </div>

      <div class="flex gap-2">
        <input x-model="input" @keydown.enter="send()"
               type="text" placeholder="Escribe un mensaje..."
               class="flex-1 bg-gray-800 border border-gray-700 text-white rounded-full px-4 py-2 text-sm focus:outline-none focus:border-indigo-500 placeholder-gray-500"
               :disabled="loading || state === 'booked'" />
        <button @click="send()"
                :disabled="loading || !input.trim() || state === 'booked'"
                class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white rounded-full w-9 h-9 flex items-center justify-center transition-colors flex-shrink-0">
          <svg class="w-4 h-4 rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
          </svg>
        </button>
      </div>

      <!-- Token info -->
      <div x-show="tokenInfo" x-cloak class="text-center mt-1">
        <span class="text-xs text-gray-700" x-text="tokenInfo"></span>
      </div>

      <!-- Brand + agent status footer -->
      <div class="flex items-center justify-between mt-2 pt-1.5 border-t border-gray-800/50">
        <a href="/" target="_blank" class="flex items-center gap-1 text-gray-600 hover:text-gray-400 transition-colors">
          <span class="text-sm">🗓️</span>
          <span class="text-xs font-medium">appt-agent</span>
        </a>
        <div class="flex items-center gap-1.5">
          <template x-if="agentReady === true">
            <span class="flex items-center gap-1 text-xs text-green-600">
              <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
              Agente activo
            </span>
          </template>
          <template x-if="agentReady === false">
            <a href="/studio/llm" target="_blank" class="flex items-center gap-1 text-xs text-yellow-600 hover:text-yellow-400">
              <span class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse"></span>
              Sin configurar ↗
            </a>
          </template>
          <template x-if="agentReady === null">
            <span class="flex items-center gap-1 text-xs text-gray-600">
              <span class="w-1.5 h-1.5 rounded-full bg-gray-500 animate-pulse"></span>
              …
            </span>
          </template>
        </div>
      </div>
    </div>
  </div>

<script>
function testChat() {
  return {
    network: 'whatsapp',
    userId:  '',
    started: false,
    messages: [],
    input:    '',
    loading:  false,
    state:    null,
    appointment: null,
    tokenInfo: '',
    sessionCounter: 0,
    agentReady: null,   // null=checking, true=ready, false=not configured
    agentMsg:   '',

    async init() {
      // Check agent status
      try {
        const r = await fetch('/agent-status');
        const d = await r.json();
        this.agentReady = d.ready;
        this.agentMsg   = d.message || '';
      } catch(_) {
        this.agentReady = false;
        this.agentMsg   = 'No se pudo contactar al servidor';
      }
      // Pre-fill from URL params if present
      const p = new URLSearchParams(window.location.search);
      if (p.get('network')) this.network = p.get('network');
      if (p.get('id'))      { this.userId = p.get('id'); this.startChat(); }
    },

    startChat() {
      if (!this.userId.trim()) return;
      this.started = true;
    },

    stateLabel(s) {
      return { greeting:'👋 Inicio', collect_info:'📝 Recopilando', confirm:'✅ Confirmar',
               booked:'🎉 Reservado', cancelled:'❌ Cancelado', error:'⚠ Error' }[s] || s;
    },

    get sessionId() {
      const base = `${this.network}:${this.userId}`;
      return this.sessionCounter > 0 ? `${base}:${this.sessionCounter}` : base;
    },

    _detailText(detail) {
      if (typeof detail === 'string') return detail;
      if (Array.isArray(detail))      return detail.map(e => e.msg || JSON.stringify(e)).join('; ');
      return JSON.stringify(detail);
    },

    async send(msg) {
      const text = msg || this.input.trim();
      if (!text || this.loading) return;
      this.input = '';
      this.messages.push({ id: Date.now(), role: 'user', content: text });
      this.loading = true;
      this.$nextTick(() => this.$refs.msgs.scrollTop = 99999);

      try {
        const r = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: this.sessionId, message: text }),
        });
        const data = await r.json();
        if (data.detail) {
          const errText = this._detailText(data.detail);
          const hint = !this.agentReady
            ? ' → <a href="/studio/llm" target="_blank" class="underline text-yellow-300">Configura el LLM aquí</a>'
            : '';
          this.messages.push({ id: Date.now()+1, role: 'assistant',
            content: '⚠ ' + errText + hint });
        } else {
          this.messages.push({ id: Date.now()+1, role: 'assistant', content: data.reply });
          this.state = data.state || null;
          if (data.appointment) this.appointment = data.appointment;
          if (data.tokens_used) {
            const t = data.tokens_used;
            this.tokenInfo = `${t.total_input_tokens}↑ ${t.total_output_tokens}↓ · $${t.total_cost_usd.toFixed(5)}`;
          }
        }
      } catch(e) {
        this.messages.push({ id: Date.now()+1, role: 'assistant', content: '❌ Error de red: ' + e.message });
      } finally {
        this.loading = false;
        this.$nextTick(() => this.$refs.msgs.scrollTop = 99999);
      }
    },

    newSession() {
      this.sessionCounter++;
      this.messages = [];
      this.state    = null;
      this.appointment = null;
      this.tokenInfo = '';
    },

    reset() {
      this.started = false;
      this.messages = [];
      this.state = null;
      this.appointment = null;
      this.sessionCounter = 0;
      this.input = '';
    },
  }
}
</script>
</body>
</html>
